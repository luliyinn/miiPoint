<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <title>point system 𝜗𝜚</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="screen-1">

      <p id="total-points"></p>
      <div id="task-div">
        <div id="confirmation"> are you sure you want to delete this task?
          <button id="yes-btn">yes</button>
          <button id="no-btn">no</button>
        </div>
      </div>

      <div id="container-one">
        <button id="new-goal">new goal</button>
        <button id="hide-goal">hide</button>
        <div id="image-inp">
          <input type="file" id="imageinput" accept="image/*">
          <div id="preview"></div>
          <input id="set-point" type="number" placeholder="points needed">
          <input id="name" type="text" placeholder="name">
          <button id="done-btn">add</button>
        </div>
      </div>

      <div id="container-two">
        <button id="new-task">new task</button>
        <button id="hide-task">hide</button>
        <div id="task-inp">
          <input id="points-earned" type="number" placeholder="points earned">
          <input id="task-name" type="text" placeholder="task">
          <input id="task-color" type="color" placeholder="color" value="#ffd1ee">
          <button id="task-add">add</button>
        </div>
      </div>
    </div>

    
    
    <div class="screen-2">   
      <p class="wishlist-p">wishlist</p>
        <div id="confirmation-2"> are you sure you want to delete this goal?
          <button id="yes-btn-2">yes</button>
          <button id="no-btn-2">no</button>
        </div>
      <div id="flex"></div>
    </div>

    <button id="reset-btn">.</button>
    <button id="reset-btn-pts">.</button>
    <button id="close">x</button>
    

  </body>
  
  <script src="script.js"></script>
</html>
